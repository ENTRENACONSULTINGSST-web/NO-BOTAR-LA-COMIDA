<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardianes del Alimento - Impacto Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --azul: #2A58AD; --amarillo: #FFD700; --verde: #4CAF50; --rojo: #e74c3c; --blanco: #FFFFFF; --celeste: #e3f2fd; }
        body { font-family: 'Poppins', sans-serif; background-color: #F4F7F6; margin: 0; }
        .app-container { max-width: 800px; margin: 20px auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background-color: var(--azul); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--amarillo); }
        .screen { padding: 30px; display: none; animation: fadeIn 0.5s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Calculadora Estilizada */
        .food-item { border: 2px solid #eee; margin: 10px 0; padding: 15px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .food-item.selected { border-color: var(--rojo); background: #fdf2f2; }
        
        /* Caja de Impacto Reincorporada */
        .impact-box { margin-top: 20px; padding: 20px; border-radius: 15px; background: var(--celeste); border: 1px solid #bbdefb; color: #1565c0; }
        .impact-box h4 { margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .impact-detail { font-size: 0.9rem; margin-bottom: 10px; border-left: 3px solid var(--rojo); padding-left: 10px; }

        .btn { border: none; padding: 18px; border-radius: 35px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; font-size: 1.1rem; }
        .btn-v { background: var(--verde); } .btn-a { background: var(--azul); } .btn-r { background: var(--rojo); }
        #diploma-area { background: white; padding: 40px; border: 10px double var(--amarillo); text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>RETO GUARDIANES<br><span style="color: var(--amarillo)">DEL ALIMENTO</span></h1></header>

    <div id="screen-mision" class="screen active">
        <h2 style="text-align: center; margin-bottom: 20px;">Tu Proyecto de Vida:</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            <div class="card-p" style="text-align:center; padding:15px; border:1px solid #ddd; border-radius:10px; cursor:pointer;" onclick="startApp('Navegantes')"><i class="fas fa-ship fa-2x"></i><br>Navegantes</div>
            <div class="card-p" style="text-align:center; padding:15px; border:1px solid #ddd; border-radius:10px; cursor:pointer;" onclick="startApp('Exploradores')"><i class="fas fa-compass fa-2x"></i><br>Exploradores</div>
            <div class="card-p" style="text-align:center; padding:15px; border:1px solid #ddd; border-radius:10px; cursor:pointer;" onclick="startApp('Aventureros')"><i class="fas fa-map-marked-alt fa-2x"></i><br>Aventureros</div>
        </div>
    </div>

    <div id="screen-calc" class="screen">
        <h2 id="titulo-mision"></h2>
        <p>¿Qué dejaste hoy en tu plato?</p>
        <div id="menu-container"></div>
        
        <div id="impact-section" class="impact-box hidden">
            <h4><i class="fas fa-chart-line"></i> Tu Impacto:</h4>
            <div id="impact-list"></div>
            <p style="font-size: 0.8rem; margin-top: 10px;"><i>*Estimación basada en huella hídrica y déficit nutricional.</i></p>
        </div>

        <button id="btn-final" class="btn btn-v" onclick="validar()">¡Mi plato está limpio! ✅</button>
    </div>

    <div id="screen-fail" class="screen" style="text-align:center;">
        <i class="fas fa-heart-broken fa-4x" style="color: var(--rojo)"></i>
        <h2>¡Casi lo logras!</h2>
        <p>Al botar comida desperdicias recursos. Mañana inténtalo de nuevo.</p>
        <button class="btn btn-a" onclick="location.reload()">Acepto el Reto</button>
    </div>

    <div id="screen-success" class="screen">
        <div id="diploma-area"><h2>DIPLOMA DE HONOR</h2><h3 id="label-mision"></h3></div>
        <button class="btn btn-a" onclick="location.reload()">Finalizar</button>
    </div>
</div>

<script>
    const URL_SHEET = "TU_ENLACE_CSV_AQUÍ"; 
    
    // Diccionario de sensibilización reincorporado
    const IMPACTOS = {
        proteina: "🥩 **Impacto:** Pérdida de aminoácidos esenciales y aprox. 1500L de agua por porción.",
        cereal: "🍚 **Impacto:** Menos energía para tu cerebro y desperdicio de cultivos de ciclo corto.",
        vegetal: "🥗 **Impacto:** Déficit de fibra y vitaminas. Afectas la biodiversidad del suelo.",
        bebida: "🥤 **Impacto:** Desperdicio de azúcares naturales y huella hídrica en procesamiento."
    };

    let itemsMenu = [];

    async function cargarMenu() {
        const response = await fetch(URL_SHEET);
        const data = await response.text();
        itemsMenu = data.split(/\r?\n/).filter(line => line.trim() !== "");
        renderMenu();
    }

    function renderMenu() {
        const container = document.getElementById('menu-container');
        container.innerHTML = itemsMenu.map((item, idx) => `
            <div class="food-item" id="f-${idx}" onclick="toggleF(${idx}, '${item}')">
                <span>${item}</span>
                <i class="fas fa-times-circle hidden"></i>
            </div>
        `).join('');
    }

    function toggleF(id, nombre) {
        document.getElementById(`f-${id}`).classList.toggle('selected');
        document.getElementById(`f-${id}`).querySelector('i').classList.toggle('hidden');
        
        const seleccionados = document.querySelectorAll('.food-item.selected');
        const impactBox = document.getElementById('impact-section');
        const impactList = document.getElementById('impact-list');

        if(seleccionados.length > 0) {
            impactBox.classList.remove('hidden');
            document.getElementById('btn-final').className = "btn btn-r";
            document.getElementById('btn-final').innerText = "Ver mi Compromiso";
            
            // Lógica de sensibilización: Detectar tipo de alimento
            let htmlImpacto = "";
            if(nombre.toLowerCase().includes("pollo") || nombre.toLowerCase().includes("carne")) htmlImpacto += `<div class="impact-detail">${IMPACTOS.proteina}</div>`;
            if(nombre.toLowerCase().includes("arroz") || nombre.toLowerCase().includes("papa")) htmlImpacto += `<div class="impact-detail">${IMPACTOS.cereal}</div>`;
            if(nombre.toLowerCase().includes("ensalada") || nombre.toLowerCase().includes("verdura")) htmlImpacto += `<div class="impact-detail">${IMPACTOS.vegetal}</div>`;
            
            impactList.innerHTML = htmlImpacto || `<div class="impact-detail">⚠️ Estás desperdiciando alimento vital del menú.</div>`;
        } else {
            impactBox.classList.add('hidden');
            document.getElementById('btn-final').className = "btn btn-v";
            document.getElementById('btn-final').innerText = "¡Mi plato está limpio! ✅";
        }
    }

    function startApp(m) {
        document.getElementById('titulo-mision').innerText = "Misión: " + m;
        document.getElementById('label-mision').innerText = m;
        showS('screen-calc');
        cargarMenu();
    }

    function showS(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function validar() {
        if(document.querySelectorAll('.food-item.selected').length > 0) showS('screen-fail');
        else showS('screen-success');
    }
</script>
</body>
</html>
